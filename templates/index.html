<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/index.css">
</head>
<body>
    <main class="minimal-container">
        <header>
            <h1>Document Tools</h1>
            <p>Seamlessly merge & convert your presentations and documents.</p>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-action="merge_pptx">Merge PPTX/PPT</button>
            <button class="tab-btn" data-action="convert_pdf">PPTX/PPT to PDF</button>
            <button class="tab-btn" data-action="merge_pdf">Merge PDF</button>
        </nav>

        <section class="upload-section">
            <div id="drop-zone" class="drop-zone">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <p>Drag & Drop your files here</p>
                <span class="or">OR</span>
                <button class="browse-btn" onclick="document.getElementById('file-input').click()">Browse Files</button>
                <input type="file" id="file-input" multiple hidden>
            </div>
            
            <div id="file-list" class="file-list"></div>
            
            <div class="actions">
                <button id="process-btn" class="process-btn" disabled>Process Files</button>
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Processing your files, please wait...</p>
            </div>
            
            <div id="error-msg" class="error-msg hidden"></div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
